services:
  mysql:
    image: 'mysql:latest'
    container_name: laravel_mysql
    ports:
      - '${DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
    volumes:
      - 'mysql_data:/var/lib/mysql'
    networks:
      - laravel_network
  redis:
    image: 'redis:latest'
    container_name: laravel_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - 'redis_data:/data'
    networks:
      - laravel_network
    command: ["redis-server", "--appendonly", "yes"]

networks:
  laravel_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
