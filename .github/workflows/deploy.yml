name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger cPanel Git Pull
        run: |
          curl -s -X POST \
            "https://${{ secrets.CPANEL_DOMAIN }}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            -d "repository_root=${{ secrets.CPANEL_REPO_PATH }}" \
            | jq .
